<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #f4f4f9; --accent: #4a90e2; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; width: 350px; }
        .card { height: 100px; background: white; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>

    <h1 id="title"></h1>
    <div class="board" id="board"></div>

    <script>
        // --- РЕДАКТИРУЙТЕ ТОЛЬКО ЭТО ---
        const CONFIG = {
            title: "English Lesson: Animals",
            items: ["Cat", "Dog", "Bird", "Fish", "Lion", "Tiger", "Bear", "Wolf", "Fox"],
            char1: "🐱",
            char2: "🐶"
        };
        // -------------------------------

        document.getElementById('title').innerText = CONFIG.title;
        const board = document.getElementById('board');
        
        CONFIG.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = item;
            card.onclick = () => {
                card.innerText = (card.innerText === item) ? (Math.random() > 0.5 ? CONFIG.char1 : CONFIG.char2) : item;
            };
            board.appendChild(card);
        });
    </script>
</body>
</html>
