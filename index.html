<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Constructor</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #editor-panel { background: #333; padding: 20px; border-radius: 10px; width: 90%; max-width: 600px; margin-bottom: 20px; }
        .game-board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; }
        .cell { width: 100px; height: 100px; background: white; color: black; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; border: 2px solid #555; }
        textarea { width: 100%; height: 60px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="editor-panel">
        <h2>Редактор игры</h2>
        <label>Имя Игрока 1: <input type="text" id="name1" value="Player 1"></label>
        <label>Имя Игрока 2: <input type="text" id="name2" value="Player 2"></label><br><br>
        <label>Символ 1 (или эмодзи): <input type="text" id="char1" value="X" size="5"></label>
        <label>Символ 2 (или эмодзи): <input type="text" id="char2" value="O" size="5"></label>
        <button onclick="applySettings()" style="background: #4CAF50; color: white; border: none; padding: 10px; cursor: pointer;">Сохранить и начать</button>
    </div>

    <div id="game-container">
        <h2 id="status">Настройте игру и нажмите кнопку</h2>
        <div class="game-board" id="board"></div>
    </div>

    <script>
        let p1 = 'X', p2 = 'O';
        function applySettings() {
            p1 = document.getElementById('char1').value;
            p2 = document.getElementById('char2').value;
            document.getElementById('status').innerText = document.getElementById('name1').value + " vs " + document.getElementById('name2').value;
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            let turn = true;
            for(let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = function() {
                    if(!this.innerText) {
                        this.innerText = turn ? p1 : p2;
                        turn = !turn;
                    }
                };
                board.appendChild(cell);
            }
        }
        renderBoard();
    </script>
</body>
</html>
