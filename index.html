<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* --- КОНФИГУРАЦИЯ ТЕМЫ --- */
        :root {
            --bg-color: #f0f0f0;
            --cell-color: #ffffff;
            --text-color: #333;
            --border-color: #333;
            /* Измените эти символы на любые эмодзи или текст */
            --player-x: 'X'; 
            --player-o: 'O';
        }

        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: var(--bg-color); }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: var(--cell-color); border: 2px solid var(--border-color);
                display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; }
        .status { margin-top: 20px; font-size: 24px; color: var(--text-color); }
    </style>
</head>
<body>

    <div class="status" id="status">Player X's Turn</div>
    <div class="board" id="board"></div>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        let board = Array(9).fill(null);
        let isX = true;

        function createBoard() {
            boardElement.innerHTML = '';
            board.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => makeMove(i);
                cell.innerText = val ? (val === 'X' ? 'X' : 'O') : ''; // Здесь можно подставить переменные из CSS
                boardElement.appendChild(cell);
            });
        }

        function makeMove(i) {
            if (!board[i]) {
                board[i] = isX ? 'X' : 'O';
                isX = !isX;
                statusElement.innerText = `Player ${isX ? 'X' : 'O'}'s Turn`;
                createBoard();
            }
        }
        createBoard();
    </script>
</body>
</html>
