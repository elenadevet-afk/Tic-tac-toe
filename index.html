<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        /* НАСТРОЙКИ ВНЕШНЕГО ВИДА */
        :root {
            --bg-color: #f7f7f7;
            --card-color: #ffcc00; /* Цвет карточки */
            --font-main: 'Arial', sans-serif;
        }
        body { font-family: var(--font-main); background: var(--bg-color); display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .card { width: 120px; height: 120px; background: var(--card-color); border-radius: 15px; 
                display: flex; align-items: center; justify-content: center; font-size: 20px; 
                cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="game-board" class="grid"></div>

    <script>
        // --- КОНФИГУРАЦИЯ (Меняйте только это!) ---
        const themeConfig = {
            character: "🐹", // Можно поставить URL картинки или эмодзи
            items: ["Apple", "Banana", "Orange", "Cat", "Dog", "Fish"]
        };
        // ------------------------------------------

        const board = document.getElementById('game-board');
        themeConfig.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `${themeConfig.character}<br>${item}`;
            card.onclick = () => alert(`Great! You found: ${item}`);
            board.appendChild(card);
        });
    </script>
</body>
</html>
