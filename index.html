<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; padding: 20px; }
        /* Панель настройки */
        .admin-panel { background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 80px; margin-top: 5px; }
        
        /* Сетка карточек */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; width: 100%; max-width: 800px; }
        .card { height: 120px; background: #4a90e2; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; padding: 10px; transition: 0.3s; }
        .card.revealed { background: #50c878; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <strong>Настройка тем:</strong><br>
        Введите пары (Вопрос:Ответ), через запятую:<br>
        <textarea id="data">Cat:Кот, Dog:Собака, Apple:Яблоко</textarea><br>
        <button onclick="initGame()">Применить изменения</button>
    </div>

    <div class="container" id="board"></div>

    <script>
        function initGame() {
            const rawData = document.getElementById('data').value;
            const pairs = rawData.split(',').map(pair => pair.split(':'));
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            pairs.forEach(pair => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerText = pair[0];
                card.onclick = () => {
                    card.innerText = card.classList.contains('revealed') ? pair[0] : pair[1];
                    card.classList.toggle('revealed');
                };
                board.appendChild(card);
            });
        }
        initGame();
    </script>
</body>
</html>
