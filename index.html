<iframe srcdoc='
<!DOCTYPE html>
<html>
<head>
<style>
    body { font-family: sans-serif; background: transparent; display: flex; flex-direction: column; align-items: center; padding: 10px; }
    #ui { background: white; padding: 15px; border-radius: 8px; border: 2px solid #333; width: 90%; }
    textarea { width: 100%; height: 60px; margin-top: 5px; }
    .board { display: grid; grid-template-columns: repeat(3, 80px); gap: 5px; margin-top: 15px; }
    .cell { width: 80px; height: 80px; border: 2px solid #000; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.7); }
</style>
</head>
<body>
    <div id="ui">
        <b>Настройка (9 элементов):</b>
        <textarea id="items" placeholder="Слово1,Слово2,Слово3..."></textarea>
        <p>Игрок 1: <input type="text" id="p1" value="X" size="3"> Игрок 2: <input type="text" id="p2" value="O" size="3"></p>
        <button onclick="start()">Запустить игру</button>
    </div>
    <div class="board" id="board"></div>
    <script>
        function start() {
            const list = document.getElementById("items").value.split(",");
            const p1 = document.getElementById("p1").value;
            const p2 = document.getElementById("p2").value;
            const board = document.getElementById("board");
            document.getElementById("ui").style.display = "none";
            let turn = true;
            list.forEach(item => {
                const div = document.createElement("div");
                div.className = "cell";
                div.innerText = item.trim();
                div.onclick = function() {
                    if(this.innerText !== p1 && this.innerText !== p2) {
                        this.innerText = turn ? p1 : p2;
                        turn = !turn;
                    }
                };
                board.appendChild(div);
            });
        }
    </script>
</body>
</html>' 
width="400" height="450" frameborder="0" allowtransparency="true"></iframe>
