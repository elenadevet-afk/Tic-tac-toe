<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Advanced Game Builder</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 450px; background: #1a1a1a; padding: 20px; border-right: 2px solid #39ff14; overflow-y: auto; }
        input, textarea { width: 100%; margin: 5px 0 15px; padding: 8px; }
        .card { background: #252525; padding: 10px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid #39ff14; }
        .btn-copy { background: #39ff14; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Конструктор с баллами и звуками 🔊</h2>
    <label>Картинка/Символ (Верный ответ):</label>
    <input type="text" id="win-sym" value="✅" oninput="draw()">
    <label>Картинка/Символ (Ошибка):</label>
    <input type="text" id="fail-sym" value="❌" oninput="draw()">
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame"></div>
</div>

<script>
    // Настройки: вопрос, правильный вариант (true/false)
    let qs = Array.from({length: 9}, (_, i) => ({ text: "Вопрос "+(i+1), isCorrect: false }));

    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<small>Клетка ${i+1}</small>
                <input type="text" value="${q.text}" oninput="qs[${i}].text=this.value;draw()">
                <label><input type="checkbox" ${q.isCorrect ? 'checked' : ''} onchange="qs[${i}].isCorrect=this.checked;draw()"> Правильный ответ?</label>`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const winSym = document.getElementById('win-sym').value;
        const failSym = document.getElementById('fail-sym').value;
        const data = JSON.stringify(qs);
        
        return `<iframe srcdoc='<!DOCTYPE html><html><head><style>
            body{margin:0;display:flex;flex-direction:column;align-items:center;height:100vh;background:transparent;font-family:sans-serif}
            .grid{display:grid;grid-template-columns:repeat(3,100px);gap:10px}
            .cell{width:100px;height:100px;border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.9);text-align:center;font-size:12px}
            #score{font-size:24px;margin-bottom:10px;color:#fff;text-shadow:0 0 5px #000}
            </style></head><body>
            <div id="score">Баллы: <span id="s">0</span></div>
            <div class="grid" id="b"></div>
            <script>
                const qs=${data}, b=document.getElementById("b"), sEl=document.getElementById("s");
                let score=0;
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                function playS(type){
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    if(type==="click"){ osc.frequency.value=440; gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); }
                    else{ osc.frequency.value=880; gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.5); }
                    osc.start(); osc.stop(audioCtx.currentTime+0.5);
                }
                qs.forEach(q=>{
                    const d=document.createElement("div"); d.className="cell"; d.innerText=q.text;
                    d.onclick=function(){
                        if(!this.dataset.used){
                            playS("click");
                            if(q.isCorrect){ score+=10; this.innerHTML="${winSym}"; playS("win"); }
                            else{ this.innerHTML="${failSym}"; }
                            sEl.innerText=score; this.dataset.used="true";
                        }
                    };
                    b.appendChild(d);
                });
            <\/script></body></html>' width="350" height="400" frameborder="0" allowtransparency="true"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() { navigator.clipboard.writeText(getCode()); alert("Код для Genially скопирован!"); }
    renderEditor(); draw();
</script>
</body>
</html>
