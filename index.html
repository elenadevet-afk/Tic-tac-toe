<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Visual Builder</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 450px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #444; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Конструктор Заданий (Visual) 🖼️</h2>
    <label>Цвет клеток:</label> <input type="color" id="cell-col" value="#ffffff" onchange="draw()">
    <label>Картинка Игрока 1:</label> <input type="text" id="p1-url" value="🍎" oninput="draw()">
    <label>Картинка Игрока 2:</label> <input type="text" id="p2-url" value="🍌" oninput="draw()">
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame"></div>
</div>

<script>
    let tasks = Array.from({length: 9}, (_, i) => "Задание " + (i + 1));

    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Задания или ссылки на картинки:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<small>Клетка ${i+1}</small><input type="text" value="${val}" oninput="tasks[${i}]=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const p1 = document.getElementById('p1-url').value;
        const p2 = document.getElementById('p2-url').value;
        const color = document.getElementById('cell-col').value;
        const data = JSON.stringify(tasks);
        
        return `<iframe srcdoc='<!DOCTYPE html><html><head><style>
            body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:transparent;font-family:sans-serif}
            .grid{display:grid;grid-template-columns:repeat(3,150px);gap:10px}
            .cell{width:150px;height:150px;border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;background:${color};text-align:center;font-weight:bold;padding:5px;box-sizing:border-box}
            .cell img{max-width:140px; max-height:140px}
            </style></head><body>
            <div class="grid" id="b"></div>
            <script>
                const tasks=${data}, b=document.getElementById("b");
                let turn=true;
                tasks.forEach(item=>{
                    const d=document.createElement("div"); d.className="cell";
                    // Если строка начинается с http - рисуем картинку, если нет - текст
                    if(item.startsWith("http")) d.innerHTML = "<img src="+item+">";
                    else d.innerText = item;
                    
                    d.onclick=function(){
                        if(!this.dataset.used){
                            const p1="${p1}", p2="${p2}";
                            this.innerHTML=turn? (p1.startsWith("http") ? "<img src="+p1+">" : p1) : (p2.startsWith("http") ? "<img src="+p2+">" : p2);
                            this.dataset.used="true"; turn=!turn;
                        }
                    };
                    b.appendChild(d);
                });
            <\/script></body></html>' width="500" height="500" frameborder="0" allowtransparency="true"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() { navigator.clipboard.writeText(getCode()); alert("Код скопирован!"); }
    renderEditor(); draw();
</script>
</body>
</html>
