<div id="wrapper" style="background: transparent; width: 100%; height: 100%; font-family: sans-serif;">
    <div id="editor" style="background: rgba(255,255,255,0.9); padding: 15px; border-radius: 10px; margin-bottom: 10px;">
        <input type="text" id="wordsInput" placeholder="9 слов через запятую" style="width: 80%; padding: 5px;">
        <button onclick="saveAndStart()" style="padding: 5px 15px; background: #4CAF50; color: white; border: none; cursor: pointer;">Применить</button>
    </div>
    
    <div id="board" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 300px;"></div>
</div>

<script>
    function saveAndStart() {
        const input = document.getElementById('wordsInput').value;
        if(input) localStorage.setItem('gameData', input);
        render();
    }

    function render() {
        const data = localStorage.getItem('gameData') || "1,2,3,4,5,6,7,8,9";
        const words = data.split(',');
        const board = document.getElementById('board');
        board.innerHTML = '';
        words.forEach(w => {
            const cell = document.createElement('div');
            cell.style = "height: 80px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.7);";
            cell.innerText = w.trim();
            cell.onclick = function() { this.innerText = "X"; };
            board.appendChild(cell);
        });
        document.getElementById('editor').style.display = 'none';
    }

    // Проверка при загрузке: если данные есть, сразу показать игру
    if(localStorage.getItem('gameData')) render();
</script>
