<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe Builder for Genially</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 400px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid #ff007f; }
        .card { background: #252525; padding: 10px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid #ff007f; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #444; box-sizing: border-box; }
        #view { flex-grow: 1; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .btn-copy { background: #ff007f; color: white; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Конструктор игры 🏆</h2>
    <label>Картинка Игрока 1 (URL):</label>
    <input type="text" id="p1-url" value="🍎" oninput="draw()">
    <label>Картинка Игрока 2 (URL):</label>
    <input type="text" id="p2-url" value="🍌" oninput="draw()">
    <hr>
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">КОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div id="view">
    <div id="preview-frame"></div>
</div>

<script>
    let cells = Array.from({length: 9}, (_, i) => "Задание " + (i + 1));

    function renderEditor() {
        const c = document.getElementById('q-list');
        cells.forEach((val, i) => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `<small>Клетка ${i+1}</small><input type="text" value="${val}" oninput="cells[${i}]=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const p1 = document.getElementById('p1-url').value;
        const p2 = document.getElementById('p2-url').value;
        const data = JSON.stringify(cells);
        
        return `<iframe srcdoc='<!DOCTYPE html><html><head><style>
            body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:transparent;font-family:sans-serif}
            .grid{display:grid;grid-template-columns:repeat(3,100px);gap:10px}
            .cell{width:100px;height:100px;border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.8);text-align:center;font-size:12px}
            .cell img{max-width:80px}
            </style></head><body>
            <div class="grid" id="b"></div>
            <script>
                const cells=${data};
                const b=document.getElementById("b");
                let turn=true;
                cells.forEach(item=>{
                    const d=document.createElement("div"); d.className="cell"; d.innerText=item;
                    d.onclick=function(){
                        if(!this.dataset.filled){
                            const icon="${p1.startsWith("http") ? "<img src="+p1+">" : p1}";
                            const icon2="${p2.startsWith("http") ? "<img src="+p2+">" : p2}";
                            this.innerHTML=turn?icon:icon2;
                            this.dataset.filled="true"; turn=!turn;
                        }
                    };
                    b.appendChild(d);
                });
            <\/script></body></html>' width="350" height="350" frameborder="0" allowtransparency="true"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() {
        navigator.clipboard.writeText(getCode());
        alert("Код скопирован!");
    }
    renderEditor(); draw();
</script>
</body>
</html>
