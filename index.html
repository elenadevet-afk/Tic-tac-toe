<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 20px; }
        .controls { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .board { display: grid; grid-template-columns: repeat(3, 80px); gap: 5px; }
        .cell { width: 80px; height: 80px; background: white; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="charX" placeholder="Player 1 (e.g. 🐱)" size="10">
        <input type="text" id="charO" placeholder="Player 2 (e.g. 🐶)" size="10">
        <input type="color" id="colorPicker" value="#ffffff">
        <button onclick="updateSettings()">Apply Changes</button>
    </div>

    <div id="board" class="board"></div>

    <script>
        let pX = 'X', pO = 'O';
        
        function updateSettings() {
            pX = document.getElementById('charX').value || 'X';
            pO = document.getElementById('charO').value || 'O';
            const bgColor = document.getElementById('colorPicker').value;
            document.querySelectorAll('.cell').forEach(c => c.style.backgroundColor = bgColor);
        }

        const boardElement = document.getElementById('board');
        for(let i=0; i<9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = (e) => e.target.innerText = (e.target.innerText === pX) ? pO : pX;
            boardElement.appendChild(cell);
        }
    </script>
</body>
</html>
