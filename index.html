<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Visual Builder - TicTacToe</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 450px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; box-sizing: border-box; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #444; box-sizing: border-box; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 14px; }
        .btn-copy:hover { background: #e6d200; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #ccc; }
        .color-row { display: flex; gap: 10px; }
        .color-row div { flex: 1; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Конструктор Крестиков-Ноликов ❌⭕</h2>
    
    <div class="color-row">
        <div>
            <label>Цвет клеток:</label> 
            <input type="color" id="cell-col" value="#ffffff" onchange="draw()">
        </div>
        <div>
            <label>Цвет текста:</label> 
            <input type="color" id="text-col" value="#333333" onchange="draw()">
        </div>
    </div>
    
    <label>Игрок 1 (Ходит первым):</label> 
    <input type="text" id="p1-url" value="🍎" oninput="draw()">
    
    <label>Игрок 2:</label> 
    <input type="text" id="p2-url" value="🍌" oninput="draw()">
    
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame"></div>
</div>

<script>
    let tasks = Array.from({length: 9}, (_, i) => "Задание " + (i + 1));

    function renderEditor() {
        const c = document.getElementById('q-list'); 
        c.innerHTML = '<h3>Текст в клетках (или ссылки на фото):</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); 
            d.className = 'card';
            d.innerHTML = `<small>Клетка ${i+1}</small><input type="text" value="${val}" oninput="tasks[${i}]=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const p1 = document.getElementById('p1-url').value.replace(/'/g, "\\'");
        const p2 = document.getElementById('p2-url').value.replace(/'/g, "\\'");
        const cellColor = document.getElementById('cell-col').value;
        const textColor = document.getElementById('text-col').value;
        const data = JSON.stringify(tasks).replace(/'/g, "\\'");
        
        return `<iframe srcdoc='<!DOCTYPE html><html><head><style>
            body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:transparent;font-family:sans-serif;overflow:hidden}
            .wrapper{position:relative;width:470px;height:470px;display:flex;justify-content:center;align-items:center}
            .grid{display:grid;grid-template-columns:repeat(3,150px);gap:10px}
            .cell{width:150px;height:150px;border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;background:${cellColor};color:${textColor};text-align:center;font-weight:bold;padding:5px;box-sizing:border-box;font-size:16px;word-break:break-word;overflow:hidden}
            .cell img{max-width:140px; max-height:140px; object-fit:contain}
            .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease;border-radius:10px;text-align:center;padding:20px;box-sizing:border-box}
            .overlay.active{opacity:1;pointer-events:all}
            .overlay h2{margin:0 0 15px 0;font-size:28px;color:#ffea00}
            .btn-reset{background:#ffea00;color:black;border:none;padding:10px 20px;font-weight:bold;cursor:pointer;border-radius:5px;font-size:16px}
            .btn-reset:hover{background:#fff}
            </style></head><body>
            <div class="wrapper">
                <div class="grid" id="b"></div>
                <div class="overlay" id="o">
                    <h2 id="m"></h2>
                    <button class="btn-reset" onclick="resetGame()">Играть снова</button>
                </div>
            </div>
            <script>
                const tasks=${data}, b=document.getElementById("b"), o=document.getElementById("o"), m=document.getElementById("m");
                let turn=true; 
                let board=Array(9).fill("");
                const winPatterns=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

                function init(){
                    b.innerHTML=""; turn=true; board.fill(""); o.className="overlay";
                    tasks.forEach((item,i)=>{
                        const d=document.createElement("div"); d.className="cell";
                        if(item.startsWith("http")) d.innerHTML = "<img src=\\""+item+"\\">";
                        else d.innerText = item;
                        
                        d.onclick=function(){
                            if(!board[i]){
                                const p1="${p1}", p2="${p2}";
                                const symbol = turn ? p1 : p2;
                                board[i] = turn ? "X" : "O";
                                
                                this.innerHTML = symbol.startsWith("http") ? "<img src=\\""+symbol+"\\">" : symbol;
                                
                                if(checkWin(board[i])){
                                    showEnd("Победил игрок " + (turn ? "1" : "2") + "!");
                                    return;
                                }
                                if(!board.includes("")){
                                    showEnd("Ничья!");
                                    return;
                                }
                                turn=!turn;
                            }
                        };
                        b.appendChild(d);
                    });
                }

                function checkWin(sym){
                    return winPatterns.some(p => board[p[0]]===sym && board[p[1]]===sym && board[p[2]]===sym);
                }

                function showEnd(msg){
                    m.innerText=msg; o.className="overlay active";
                }

                function resetGame(){ init(); }
                init();
            <\/script></body></html>' width="500" height="500" frameborder="0" allowtransparency="true"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() { navigator.clipboard.writeText(getCode()); alert("Код скопирован! Теперь вставьте его в Genially через Вставку (Insert -> Embed)."); }
    renderEditor(); draw();
</script>
</body>
</html>
