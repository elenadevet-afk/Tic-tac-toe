<iframe 
    width="100%" 
    height="100%" 
    frameborder="0" 
    srcdoc='<!DOCTYPE html>
    <html>
    <head>
        <style>
            body { font-family: sans-serif; background: transparent; display: flex; flex-direction: column; align-items: center; }
            #ui { background: rgba(255,255,255,0.9); padding: 20px; border-radius: 10px; position: absolute; z-index: 10; }
            #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
            .cell { width: 100px; height: 100px; background: rgba(255,255,255,0.6); border: 2px solid #000; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; text-align: center; }
        </style>
    </head>
    <body>
        <div id="ui">
            <textarea id="items" placeholder="9 слов или ссылок через запятую"></textarea><br>
            <button onclick="start()">Запустить игру</button>
        </div>
        <div id="board"></div>
        <script>
            function start() {
                const list = document.getElementById("items").value.split(",");
                const board = document.getElementById("board");
                document.getElementById("ui").style.display = "none";
                board.innerHTML = "";
                list.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "cell";
                    div.innerHTML = item.trim().startsWith("http") ? `<img src="${item.trim()}" width="80">` : item.trim();
                    div.onclick = function() { this.innerText = "X"; };
                    board.appendChild(div);
                });
            }
        </script>
    </body>
    </html>'>
</iframe>
