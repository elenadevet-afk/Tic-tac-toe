<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Educational Game Constructor</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; background: #f0f0f0; }
        #admin-panel { width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #preview-area { flex-grow: 1; background: white; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 100px; }
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item { border: 2px solid #333; padding: 10px; text-align: center; height: 100px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="admin-panel">
    <h2>🛠 Редактор учебной игры</h2>
    <label>Заголовок игры:</label><br>
    <input type="text" id="gameTitle" value="My Lesson" oninput="update()"><br><br>
    
    <label>Контент (Слово или URL картинки, через запятую):</label>
    <textarea id="gameContent" oninput="update()">Apple, https://cdn-icons-png.flaticon.com/512/415/415733.png, Cat, Dog</textarea>
    
    <p><small>Вставьте ссылки на картинки или слова. После изменений игра обновится автоматически.</small></p>
</div>

<div id="preview-area">
    <h1 id="outTitle"></h1>
    <div class="game-grid" id="outGrid"></div>
</div>

<script>
    function update() {
        const title = document.getElementById('gameTitle').value;
        const content = document.getElementById('gameContent').value.split(',');
        
        document.getElementById('outTitle').innerText = title;
        const grid = document.getElementById('outGrid');
        grid.innerHTML = '';
        
        content.forEach(item => {
            const trimmed = item.trim();
            const div = document.createElement('div');
            div.className = 'item';
            
            if (trimmed.startsWith('http')) {
                div.innerHTML = `<img src="${trimmed}" style="max-width:80px; max-height:80px;">`;
            } else {
                div.innerText = trimmed;
            }
            grid.appendChild(div);
        });
    }
    update(); // Запуск при загрузке
</script>
</body>
</html>
