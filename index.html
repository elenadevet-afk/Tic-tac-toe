<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fff; padding: 20px; }
        .config-panel { background: #f0f0f0; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #333; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; }
        .cell { width: 100px; height: 100px; border: 2px solid #000; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; overflow: hidden; }
        .cell img { max-width: 90px; max-height: 90px; }
    </style>
</head>
<body>

<div class="config-panel" id="editor">
    <h3>Конструктор игры (Настройки)</h3>
    <input type="text" id="urlX" placeholder="URL картинки для X или текст">
    <input type="text" id="urlO" placeholder="URL картинки для O или текст"><br><br>
    <button onclick="buildGame()">Применить и начать игру</button>
</div>

<div class="board" id="board"></div>

<script>
    function buildGame() {
        const valX = document.getElementById('urlX').value || 'X';
        const valO = document.getElementById('urlO').value || 'O';
        document.getElementById('editor').style.display = 'none';
        
        const board = document.getElementById('board');
        let turn = true;

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = function() {
                if (!this.innerHTML) {
                    const content = turn ? valX : valO;
                    if (content.startsWith('http')) {
                        this.innerHTML = `<img src="${content}">`;
                    } else {
                        this.innerText = content;
                    }
                    turn = !turn;
                }
            };
            board.appendChild(cell);
        }
    }
</script>
</body>
</html>
