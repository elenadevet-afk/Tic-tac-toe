<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe Customizer</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #e0e0e0; padding: 20px; }
        .editor { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; }
        .cell { width: 100px; height: 100px; background: white; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; transition: 0.3s; }
        .cell:hover { background: #f0f0f0; }
    </style>
</head>
<body>

    <div class="editor">
        <h3>Theme Settings</h3>
        Player 1: <input type="text" id="p1" value="❌" size="5">
        Player 2: <input type="text" id="p2" value="⭕" size="5">
        <button onclick="saveSettings()">Apply & Reset</button>
    </div>

    <div class="board" id="board"></div>

    <script>
        let p1 = localStorage.getItem('p1') || '❌';
        let p2 = localStorage.getItem('p2') || '⭕';
        let board = Array(9).fill(null);
        let turn = true;

        function saveSettings() {
            localStorage.setItem('p1', document.getElementById('p1').value);
            localStorage.setItem('p2', document.getElementById('p2').value);
            location.reload();
        }

        function createBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            board.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = val || '';
                cell.onclick = () => {
                    if (!board[i]) {
                        board[i] = turn ? p1 : p2;
                        turn = !turn;
                        createBoard();
                    }
                };
                b.appendChild(cell);
            });
        }

        document.getElementById('p1').value = p1;
        document.getElementById('p2').value = p2;
        createBoard();
    </script>
</body>
</html>
