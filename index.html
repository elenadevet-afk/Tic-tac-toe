<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fff; }
        .board { display: grid; grid-template-columns: repeat(3, 120px); gap: 10px; margin-top: 20px; }
        .cell { width: 120px; height: 120px; border: 3px solid #333; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; overflow: hidden; }
        .cell img { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

    <div class="board" id="board"></div>

    <script>
        // --- ВАШ РЕДАКТОР (Меняйте здесь) ---
        const gameConfig = {
            cells: [
                "Apple", "https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg", "Cat",
                "Dog", "Ball", "Car",
                "Sun", "Tree", "Book"
            ],
            p1: "X", // Или ссылка на картинку игрока
            p2: "O"
        };
        // ------------------------------------

        const board = document.getElementById('board');
        let turn = true;

        gameConfig.cells.forEach(item => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            
            // Проверка: это ссылка на картинку или текст?
            if (item.startsWith('http')) {
                cell.innerHTML = `<img src="${item}">`;
            } else {
                cell.innerText = item;
            }

            cell.onclick = () => {
                cell.innerHTML = turn ? (gameConfig.p1.startsWith('http') ? `<img src="${gameConfig.p1}">` : gameConfig.p1) : 
                                       (gameConfig.p2.startsWith('http') ? `<img src="${gameConfig.p2}">` : gameConfig.p2);
                turn = !turn;
            };
            board.appendChild(cell);
        });
    </script>
</body>
</html>
