<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Customizer</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: white; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; }
        .admin { background: #fff; padding: 20px; border: 2px dashed #666; margin-top: 20px; width: 300px; }
    </style>
</head>
<body>

    <div id="game-view">
        <h2 id="theme-title">Game</h2>
        <div class="board" id="board"></div>
    </div>

    <div id="admin-view" class="admin hidden">
        <h3>Settings</h3>
        Theme Name: <input type="text" id="in-title"><br><br>
        Player 1 (Char): <input type="text" id="in-p1" size="5"><br>
        Player 2 (Char): <input type="text" id="in-p2" size="5"><br>
        <button onclick="save()">Save & Apply</button>
    </div>

    <script>
        // Инициализация из памяти
        const config = JSON.parse(localStorage.getItem('gameCfg')) || { title: "Tic Tac Toe", p1: "❌", p2: "⭕" };
        
        // Отображение панели редактирования
        if (window.location.search.includes('edit=true')) {
            document.getElementById('admin-view').classList.remove('hidden');
            document.getElementById('in-title').value = config.title;
            document.getElementById('in-p1').value = config.p1;
            document.getElementById('in-p2').value = config.p2;
        }

        function save() {
            const newCfg = { 
                title: document.getElementById('in-title').value,
                p1: document.getElementById('in-p1').value,
                p2: document.getElementById('in-p2').value
            };
            localStorage.setItem('gameCfg', JSON.stringify(newCfg));
            alert("Settings saved! Refresh to see changes.");
        }

        // Рендер игры
        document.getElementById('theme-title').innerText = config.title;
        const board = document.getElementById('board');
        for(let i=0; i<9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = (e) => e.target.innerText = (e.target.innerText === config.p1) ? config.p2 : config.p1;
            board.appendChild(cell);
        }
    </script>
</body>
</html>
